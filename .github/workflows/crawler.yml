name: 세법해석례 크롤러
on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests

      - name: EC2에 파이썬 설치
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip
            pip3 install requests --break-system-packages

      - name: 크롤러 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "crawler.py"
          target: "/home/ubuntu/"

      - name: EC2에서 크롤러 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: NTS_COOKIE
          script: |
            export NTS_COOKIE="${{ secrets.NTS_COOKIE }}"
            cd /home/ubuntu
            python3 crawler.py

      - name: 결과물 다운로드
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            ls /home/ubuntu/output/

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 세법해석례_최종본
          path: output/
          retention-days: 7
