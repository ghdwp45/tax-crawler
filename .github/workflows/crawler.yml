name: 세법해석례 크롤러
on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: EC2에 패키지 설치
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo apt-get install -y python3-pip python3-bs4 -q
            pip3 install requests beautifulsoup4 --break-system-packages

      - name: 크롤러 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "kasb_crawler.py"
          target: "/home/ubuntu/"

      - name: EC2에서 크롤러 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 60m
          script: |
            cd /home/ubuntu
            mkdir -p output
            python3 kasb_crawler.py

      - name: 결과물 EC2에서 가져오기
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "/home/ubuntu/output/*.md"
          target: "output/"
          strip_components: 3

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 회계기준원_질의회신_최종본
          path: output/
          retention-days: 7
