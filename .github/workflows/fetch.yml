name: EC2 파일 가져오기
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: EC2에서 파일 가져오기
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "output/*.md"
          target: "output/"
          strip_components: 2

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 회계기준원_질의회신_최종본
          path: output/
          retention-days: 7
